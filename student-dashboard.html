<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link rel="stylesheet" href="student-dashboard.css">

</head>

<body>

<div class="dashboard">

<!-- HEADER -->

<div class="header">

<img src="images/logo.png" class="school-logo">

<div>

<h1>Madarasatul Arkanul Islam</h1>

<h3>Wadirasatul Islamiyya</h3>

<p>Student Portal</p>

</div>

</div>

<!-- STUDENT PROFILE -->

<div class="profile-card">

<img src="images/passport.png" id="studentPassport" class="passport">

<div class="student-info">

<h2 id="studentName">Loading...</h2>

<p id="applicationNumber"></p>

<p id="studentClass"></p>

<p id="studentStatus"></p>

<p>Session: 2026/2027</p>

</div>

</div>
<!-- SCHOOL FEES -->

<div class="fees-card">

<h2>💰 School Fees Summary</h2>

<div class="fee-box">

<div>
<h3>Total Fees</h3>
<p id="totalFees">₦0</p>
</div>

<div>
<h3>Amount Paid</h3>
<p id="amountPaid">₦0</p>
</div>

<div>
<h3>Balance</h3>
<p id="balance">₦0</p>
</div>

<div>
<h3>Status</h3>
<p id="paymentStatus">Not Paid</p>
</div>

</div>

</div>
<div class="logout" id="logout">

🚪 Logout

</div>

<script type="module" src="student-dashboard.js"></script>

</div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Fees Receipt</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.header{
text-align:center;
margin-bottom:20px;
}

.header img{
width:80px;
height:80px;
}

.header h2{
color:#5b2c6f;
margin-top:10px;
}

.header p{
font-size:13px;
margin-top:5px;
}

.title{
background:#5b2c6f;
color:#fff;
padding:12px;
text-align:center;
font-size:20px;
font-weight:bold;
margin:20px 0;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
border:1px solid #ddd;
padding:12px;
}

.label{
background:#f7f7f7;
font-weight:bold;
width:40%;
}

button{
width:100%;
margin-top:25px;
padding:15px;
background:#5b2c6f;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

@media print{

button{
display:none;
}

body{
background:white;
padding:0;
}

.container{
box-shadow:none;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<img src="Images/logo.png">

<h2>MADARASATUL ARKANUL ISLAM</h2>

<p>Wadirasatul Islamiyya</p>

<p>Beside Chanchaga Primary School, Along Supreme International School, Minna, Niger State.</p>

</div>

<div class="title">

OFFICIAL SCHOOL FEES RECEIPT

</div>

<table>

<tr><td class="label">Receipt No</td><td id="receiptNumber"></td></tr>

<tr><td class="label">Application No</td><td id="applicationNumber"></td></tr>

<tr><td class="label">Student Name</td><td id="studentName"></td></tr>

<tr><td class="label">Class</td><td id="studentClass"></td></tr>

<tr><td class="label">Total Fees</td><td id="totalFees"></td></tr>

<tr><td class="label">Amount Paid</td><td id="amountPaid"></td></tr>

<tr><td class="label">Balance</td><td id="balance"></td></tr>

<tr><td class="label">Payment Method</td><td id="paymentMethod"></td></tr>

<tr><td class="label">Payment Date</td><td id="paymentDate"></td></tr>

</table>

<button onclick="window.print()">

🖨 Print Receipt

</button>

</div>

<script type="module" src="receipt.js"></script>

</body>
</html>

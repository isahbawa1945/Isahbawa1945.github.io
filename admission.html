<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Form - Madarasatul Arkanul Islam</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="admission-form">

<div class="container">

<h2>Student Admission Form</h2>

<form id="admissionForm">

<label>Student Full Name</label>
<input type="text" name="fullName" placeholder="Enter Full Name" required>

<label>Date of Birth</label>
<input type="date" name="dob" required>

<label>Gender</label>
<select name="gender" required>
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
</select>

<label>State of Origin</label>
<input type="text" name="state" placeholder="Enter State of Origin" required>

<label>Local Government Area (LGA)</label>
<input type="text" name="lga" placeholder="Enter Local Government Area" required>

<label>Class Applying For</label>
<select name="studentClass" required>
    <option value="">Select Class</option>
    <option>Beginners</option>
    <option>Intermediate</option>
    <option>Advanced</option>
    <option>Tahfiz</option>
</select>

<label>Parent/Guardian Name</label>
<input type="text" name="parentName" placeholder="Parent/Guardian Name" required>

<label>Phone Number</label>
<input type="tel" name="phone" placeholder="Phone Number" required>

<label>Email Address</label>
<input type="email" name="email" placeholder="Email Address">

<label>Home Address</label>
<textarea name="address" rows="4" placeholder="Home Address" required></textarea>

<label>Additional Information</label>
<textarea name="info" rows="5" placeholder="Write any additional information"></textarea>

<label>Passport Photograph</label>
<input type="file" name="passport" accept="image/*">

<label>Create Password</label>

<input
type="password"
id="password"
name="password"
placeholder="Create Password"
required>

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
name="confirmPassword"
placeholder="Confirm Password"
required>


<button type="submit">Submit Application</button>

</form>

</div>

</section>

<script src="script.js"></script>
<script type="module" src="admission.js"></script>

</body>
</html>

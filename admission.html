<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Form - Madarasatul Arkanul Islam</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="admission-form">

<div class="container">

<h2>Student Admission Form</h2>

<form id="admissionForm">

<label>Student Full Name</label>
<input type="text" placeholder="Enter Full Name" required>

<label>Date of Birth</label>
<input type="date" required>

<label>Gender</label>

<select required>
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Class Applying For</label>

<select required>
<option>Select Class</option>
<option>Beginners</option>
<option>Intermediate</option>
<option>Advanced</option>
<option>Tahfiz</option>
</select>

<label>Parent/Guardian Name</label>
<input type="text" placeholder="Parent Name">

<label>Phone Number</label>
<input type="tel" placeholder="Phone Number">

<label>Home Address</label>
<textarea rows="4" placeholder="Address"></textarea>

<label>Additional Information</label>
<textarea rows="5" placeholder="Write here..."></textarea>

<button type="submit">Submit Application</button>

  
</form>

</div>

</section>


<script src="script.js"></script>
<script type="module" src="firebase.js"></script>



</body>

</html>

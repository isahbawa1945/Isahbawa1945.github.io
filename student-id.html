<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student ID Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.id-card{
width:360px;
background:white;
border:4px solid #5b2c6f;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.header{
background:#5b2c6f;
color:white;
text-align:center;
padding:15px;
}

.header img{
width:70px;
height:70px;
margin-bottom:10px;
}

.header h2{
font-size:20px;
}

.header p{
font-size:13px;
}

.title{
background:#8b5a2b;
color:white;
text-align:center;
padding:10px;
font-weight:bold;
font-size:18px;
}

.passport{
width:120px;
height:140px;
margin:20px auto;
border:2px solid #5b2c6f;
border-radius:8px;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#f7f7f7;
}

.passport img{
width:100%;
height:100%;
object-fit:cover;
}

.details{
padding:20px;
line-height:2;
font-size:15px;
}

.details strong{
display:inline-block;
width:120px;
color:#5b2c6f;
}

.footer{
display:flex;
justify-content:space-between;
padding:20px;
margin-top:10px;
}

.sign{
width:120px;
text-align:center;
border-top:1px solid #000;
padding-top:5px;
font-size:13px;
}

.printBtn{
width:360px;
margin:20px auto;
display:block;
padding:15px;
background:#5b2c6f;
color:white;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
}

.printBtn:hover{
background:#8b5a2b;
}

@media print{

.printBtn{
display:none;
}

body{
background:white;
}

.id-card{
box-shadow:none;
}

}

</style>

</head>

<body>

<div>

<div class="id-card">

<div class="header">

<img src="Images/logo.png" alt="School Logo">



<h2>MADARASATUL ARKANUL ISLAM</h2>

<p style="font-weight:bold;">
Wadirasatul Islamiyya
</p>

<p style="
font-size:11px;
line-height:1.4;
margin-top:5px;
padding:0 10px;
">
Beside Chanchaga Primary School,<br>
Along Supreme International School,<br>
Minna, Niger State, Nigeria.
</p>

<p style="
font-size:12px;
font-weight:bold;
margin-top:6px;
color:#FFD700;
">
Motto: Qur'an, Sunnah, Knowledge 
</p>



</div>

<div class="title">

STUDENT ID CARD

</div>

<div class="passport" id="passport">

No Passport

</div>

<div class="details">

<p><strong>Name:</strong> <span id="fullName"></span></p>

<p><strong>Adm No:</strong> <span id="applicationNumber"></span></p>

<p><strong>Class:</strong> <span id="studentClass"></span></p>

<p><strong>Status:</strong> <span id="status"></span></p>

</div>

</div>

<div style="
text-align:center;
font-size:13px;
font-weight:bold;
color:#5b2c6f;
margin-top:10px;
margin-bottom:5px;
">
Academic Session: 2026/2027
</div>

<div class="footer">





<div class="footer">

<div class="sign">

Principal

</div>

<div class="sign">

School Stamp

</div>

</div>

</div>

<button class="printBtn" onclick="window.print()">

🖨 Print Student ID Card

</button>
<script type="module">

import { db, doc, getDoc } from "./firebase.js";

// Get student ID from URL
const params = new URLSearchParams(window.location.search);
const studentId = params.get("id");

if (!studentId) {

    alert("No student selected.");

} else {

    try {

        const studentRef = doc(db, "admissions", studentId);
        const studentSnap = await getDoc(studentRef);

        if (studentSnap.exists()) {

            const student = studentSnap.data();

            document.getElementById("fullName").textContent = student.fullName || "";
            document.getElementById("applicationNumber").textContent = student.applicationNumber || "";
            document.getElementById("studentClass").textContent = student.studentClass || "";
            document.getElementById("status").textContent = student.status || "Pending";

            // Display passport (temporary localStorage method)
            const passport = localStorage.getItem("passport");

            if (passport && passport !== "") {

                document.getElementById("passport").innerHTML = `
                    <img src="${passport}" alt="Passport">
                `;

            } else {

                document.getElementById("passport").innerHTML = `
                    <div style="
                        display:flex;
                        justify-content:center;
                        align-items:center;
                        width:100%;
                        height:100%;
                        color:#666;
                    ">
                        No Passport
                    </div>
                `;

            }

        } else {

            alert("Student record not found.");

        }

    } catch (error) {

        console.error(error);
        alert("Error loading student information.");

    }

}

</script>

</body>
</html>

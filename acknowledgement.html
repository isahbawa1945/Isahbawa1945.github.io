<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acknowledgement Slip</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.slip{
    width:90%;
    max-width:700px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.slip h1{
    text-align:center;
    color:#5b2c6f;
}

.slip h2{
    text-align:center;
    color:#8b5a2b;
}

.slip p{
    font-size:18px;
    margin:15px 0;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    background:#5b2c6f;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#8b5a2b;
}

@media print{
button{
display:none;
}
}
</style>

</head>

<body>

<div class="slip">

<h1>MADARASATUL ARKANUL ISLAM</h1>

<h2>WADIRASATUL ISLAMIYYA</h2>

<hr>

<h2>STUDENT ADMISSION ACKNOWLEDGEMENT SLIP</h2>

<p><strong>Application Number:</strong>
<span id="appNo"></span></p>

<p><strong>Student Name:</strong>
<span id="studentName"></span></p>

<p><strong>Class Applied For:</strong>
<span id="studentClass"></span></p>

<p><strong>Status:</strong>
Pending</p>

<p><strong>Date:</strong>
<span id="today"></span></p>

<button onclick="window.print()">
Print Acknowledgement Slip
</button>

</div>

<script>

document.getElementById("appNo").textContent=
localStorage.getItem("applicationNumber");

document.getElementById("studentName").textContent=
localStorage.getItem("studentName");

document.getElementById("studentClass").textContent=
localStorage.getItem("studentClass");

document.getElementById("today").textContent=
new Date().toLocaleDateString();

</script>

</body>
</html>

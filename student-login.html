<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:400px;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#5b2c6f;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#5b2c6f;
color:white;
border:none;
border-radius:6px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#8b5a2b;
}
</style>

</head>

<body>

<div class="container">

<h2>Student Portal Login</h2>

<input
type="text"
id="applicationNumber"
placeholder="Application Number">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

</div>

<script type="module" src="student-login.js"></script>

</body>
</html>

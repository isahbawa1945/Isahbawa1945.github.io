<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Settings</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#5b2c6f;
margin-bottom:30px;
}

h2{
color:#5b2c6f;
margin:20px 0 10px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

select{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#5b2c6f;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#8b5a2b;
}

.back{
background:#555;
}

.back:hover{
background:#333;
}

</style>

</head>

<body>

<div class="container">

<h1>⚙ Admin Settings</h1>

<h2>School Information</h2>

<input id="schoolName" placeholder="School Name">

<input id="schoolAddress" placeholder="School Address">

<input id="schoolPhone" placeholder="Phone Number">

<input id="schoolEmail" placeholder="Email Address">

<h2>Admin Account</h2>

<input id="adminUsername" placeholder="Admin Username">

<input id="adminPassword" type="password" placeholder="Admin Password">

<h2>Admission Status</h2>

<select id="admissionStatus">

<option value="Open">Open Admission</option>

<option value="Closed">Close Admission</option>

</select>

<button id="saveBtn">
💾 Save Settings
</button>

<button class="back" onclick="window.location.href='admin.html'">
⬅ Back to Dashboard
</button>

</div>

<script type="module" src="settings.js"></script>

</body>
</html>

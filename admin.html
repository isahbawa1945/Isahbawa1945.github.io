<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#5b2c6f;
color:white;
padding:20px;
text-align:center;
}

.container{
width:95%;
margin:20px auto;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
text-align:center;
}

.card h2{
font-size:36px;
color:#5b2c6f;
margin-bottom:10px;
}

.card p{
font-size:16px;
font-weight:bold;
}

input{
width:100%;
padding:14px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,.1);
min-width:900px;
}

th{
background:#5b2c6f;
color:white;
padding:12px;
}

td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

tr:nth-child(even){
background:#f8f8f8;
}

button:not(#logoutBtn){
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
color:white;
margin:2px;
font-size:14px;
}

.view{
background:#3498db;
}

.approve{
background:#27ae60;
}

.reject{
background:#e67e22;
}

.delete{
background:#e74c3c;
}

button:hover{
opacity:.9;
}

.status-pending{
color:#e67e22;
font-weight:bold;
}

.status-approved{
color:green;
font-weight:bold;
}

.status-rejected{
color:red;
font-weight:bold;
}

@media(max-width:768px){

header h1{
font-size:22px;
}

.card h2{
font-size:28px;
}

input{
font-size:15px;
}

button{
font-size:12px;
padding:6px 8px;
}

}

</style>

</head>

<body>

<header>

<h1>School Admin Dashboard</h1>

<p>Madarasatul Arkanul Islam Wadirasatul Islamiyya</p>

<button id="logoutBtn">Logout</button>

</header>

<div class="container">

<div class="stats">

<div class="card">
<h2 id="total">0</h2>
<p>Total Applications</p>
</div>

<div class="card">
<h2 id="pending">0</h2>
<p>Pending</p>
</div>

<div class="card">
<h2 id="approved">0</h2>
<p>Approved</p>
</div>

<div class="card">
<h2 id="rejected">0</h2>
<p>Rejected</p>
</div>

</div>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">

<input
type="text"
id="search"
placeholder="Search Student Name or Application Number"
style="flex:1;margin-bottom:0;">

<button
id="exportBtn"
style="
background:#27ae60;
color:white;
padding:14px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
white-space:nowrap;
">
📥 Export Excel
</button>

</div>


<div class="table-container">

<table>

<thead>

<tr>

<th>Application No</th>
<th>Student Name</th>
<th>Class</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="students">

</tbody>

</table>

</div>

</div>

<script>
if(localStorage.getItem("adminLoggedIn") !== "true"){
    alert("Please login first.");
    window.location.href = "login.html";
}
</script>

<script type="module" src="admin.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check Admission Status</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:90px;
height:90px;
}

h1{
text-align:center;
color:#5b2c6f;
margin-bottom:10px;
}

p{
text-align:center;
margin-bottom:25px;
color:#555;
}

input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
background:#5b2c6f;
color:white;
border:none;
border-radius:6px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#8b5a2b;
}

.result{
display:none;
margin-top:25px;
padding:20px;
background:#f8f8f8;
border-radius:8px;
}

.result h3{
color:#5b2c6f;
margin-bottom:15px;
}

.result p{
text-align:left;
margin:10px 0;
color:#333;
}

#letterBtn{
display:none;
width:100%;
margin-top:20px;
padding:14px;
background:#27ae60;
color:white;
text-decoration:none;
text-align:center;
border-radius:8px;
font-weight:bold;
transition:.3s;
}

#letterBtn:hover{
background:#219150;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="Images/logo.png" alt="Logo">
</div>

<h1>Admission Status Checker</h1>

<p>Enter your Application Number</p>

<input
type="text"
id="applicationNumber"
placeholder="Example: ARK1784105689493">

<button id="checkBtn">
🔎 Check Status
</button>

<div class="result" id="result">

<h3>Admission Details</h3>

<p><strong>Application Number:</strong> <span id="app"></span></p>

<p><strong>Student Name:</strong> <span id="name"></span></p>

<p><strong>Class Applied:</strong> <span id="studentClass"></span></p>

<p><strong>Status:</strong> <span id="status"></span></p>

<a id="letterBtn" href="#">
📄 Download Admission Letter
</a>

</div>

</div>

<script type="module" src="check-status.js"></script>

</body>
</html>

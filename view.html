<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Details</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:#fff;
    border-radius:12px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#5b2c6f;
    margin-bottom:25px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    border:1px solid #ddd;
    padding:12px;
    font-size:16px;
}

.label{
    font-weight:bold;
    background:#f7f7f7;
    width:35%;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    background:#5b2c6f;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#8b5a2b;
}
</style>

</head>

<body>

<div class="container">

<h1>Student Details</h1>

<table>

<tr>
<td class="label">Application Number</td>
<td id="app"></td>
</tr>

<tr>
<td class="label">Full Name</td>
<td id="name"></td>
</tr>

<tr>
<td class="label">Date of Birth</td>
<td id="dob"></td>
</tr>

<tr>
<td class="label">Gender</td>
<td id="gender"></td>
</tr>

<tr>
<td class="label">State</td>
<td id="state"></td>
</tr>

<tr>
<td class="label">LGA</td>
<td id="lga"></td>
</tr>

<tr>
<td class="label">Class Applied For</td>
<td id="class"></td>
</tr>

<tr>
<td class="label">Parent/Guardian</td>
<td id="parent"></td>
</tr>

<tr>
<td class="label">Phone Number</td>
<td id="phone"></td>
</tr>

<tr>
<td class="label">Email Address</td>
<td id="email"></td>
</tr>

<tr>
<td class="label">Home Address</td>
<td id="address"></td>
</tr>

<tr>
<td class="label">Additional Information</td>
<td id="info"></td>
</tr>

</table>

<button onclick="history.back()">⬅ Back to Dashboard</button>

</div>

<script type="module" src="view.js"></script>

</body>
</html>
